name: Release container

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: sigstore/cosign-installer@v4.1.2
      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/wolt
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - id: buildinfo
        name: Resolve build information
        run: |
          echo "commit_sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            WOLT_VERSION=${{ github.ref_name }}
            WOLT_COMMIT_SHA=${{ steps.buildinfo.outputs.commit_sha }}
            WOLT_BUILD_DATE=${{ steps.buildinfo.outputs.build_date }}
          provenance: mode=max
          sbom: true
      - name: Sign immutable release digest
        env:
          IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/wolt
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha256sum install.sh > install.sh.sha256
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --generate-notes \
            --title "WOLT ${GITHUB_REF_NAME}" \
            install.sh install.sh.sha256
