name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: test
          load: true
          tags: wolt:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run tests
        run: docker run --rm wolt:test
      - name: Build production image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          load: true
          tags: wolt:ci
      - name: Validate PostgreSQL migrations
        run: |
          docker network create wolt-ci
          docker run -d --name wolt-ci-postgres --network wolt-ci \
            -e POSTGRES_DB=wolt \
            -e POSTGRES_USER=wolt \
            -e POSTGRES_PASSWORD=ci-only-password \
            postgres:18-alpine
          for attempt in $(seq 1 30); do
            if docker exec wolt-ci-postgres pg_isready -U wolt -d wolt; then
              break
            fi
            sleep 1
          done
          docker run --rm --network wolt-ci \
            -e DATABASE_URL=postgresql+psycopg://wolt:ci-only-password@wolt-ci-postgres:5432/wolt \
            wolt:ci alembic upgrade head
          docker run --rm --network wolt-ci \
            -e DATABASE_URL=postgresql+psycopg://wolt:ci-only-password@wolt-ci-postgres:5432/wolt \
            wolt:ci alembic check
      - name: Clean integration containers
        if: always()
        run: |
          docker rm -f wolt-ci-postgres 2>/dev/null || true
          docker network rm wolt-ci 2>/dev/null || true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
